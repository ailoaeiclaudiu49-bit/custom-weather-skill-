<!DOCTYPE html>
<html>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        // Encode the AI's data to pass it safely in a URL
        const encodedData = encodeURIComponent(data || "{}");
        
        // The magic payload that tells the app to open our visual widget!
        return JSON.stringify({
          result: "Weather successfully loaded.",
          webview: {
            url: `../assets/widget.html?data=${encodedData}`
          }
        });
      };
    </script>
  </body>
</html>
